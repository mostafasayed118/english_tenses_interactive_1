<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tenses & Grammar — Interactive Learning</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#dbeafe;--secondary:#10b981;--secondary-light:#d1fae5;--amber:#f59e0b;--amber-light:#fef3c7;--red:#ef4444;--red-light:#fee2e2;--purple:#7c3aed;--purple-light:#ede9fe;--teal:#0d9488;--teal-light:#ccfbf1;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);--shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);--radius:8px;--radius-lg:12px;--transition:.2s ease}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-800);line-height:1.6;min-height:100vh}
/* DARK MODE */
[data-theme="dark"]{--gray-50:#0f172a;--gray-100:#1e293b;--gray-200:#334155;--gray-300:#475569;--gray-400:#94a3b8;--gray-500:#cbd5e1;--gray-600:#e2e8f0;--gray-700:#f1f5f9;--gray-800:#f8fafc;--gray-900:#f8fafc;--shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);--shadow-md:0 4px 6px rgba(0,0,0,.4),0 2px 4px rgba(0,0,0,.3);--shadow-lg:0 10px 15px rgba(0,0,0,.5),0 4px 6px rgba(0,0,0,.3)}
[data-theme="dark"] .sidebar{background:var(--gray-100);border-right-color:var(--gray-200)}
[data-theme="dark"] .section-card{background:var(--gray-100);border-color:var(--gray-200)}
[data-theme="dark"] .quiz-question{background:var(--gray-50)}
[data-theme="dark"] .quiz-option{background:var(--gray-50)}
[data-theme="dark"] .practice-card{background:var(--gray-50)}
[data-theme="dark"] .score-bar{background:var(--gray-50)}
[data-theme="dark"] .accordion-header{background:var(--gray-50)}
[data-theme="dark"] .example-box{background:rgba(37,99,235,.15)}
[data-theme="dark"] .mistake-box{background:rgba(239,68,68,.15)}
[data-theme="dark"] .compare-box{background:rgba(245,158,11,.15)}
[data-theme="dark"] .tip-card{background:var(--gray-50)}
[data-theme="dark"] .dash-card{background:var(--gray-50)}
[data-theme="dark"] .summary-table th{background:var(--gray-50)}
[data-theme="dark"] .summary-table td{border-bottom-color:var(--gray-200)}
[data-theme="dark"] .signal-tags span{background:var(--gray-50);border-color:var(--gray-200)}
[data-theme="dark"] .accordion-item{border-color:var(--gray-200)}
[data-theme="dark"] .comparison-col{background:var(--gray-50)}
[data-theme="dark"] .practice-card .p-input{background:var(--gray-50);color:var(--gray-800)}
[data-theme="dark"] .modal{background:var(--gray-100)}
.theme-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px;line-height:1;opacity:.8;transition:var(--transition)}
.theme-btn:hover{opacity:1}
/* HEADER */
.app-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:var(--shadow-md)}
.app-header .logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;letter-spacing:-.3px}
.app-header .logo svg{width:28px;height:28px}
.header-right{display:flex;align-items:center;gap:16px}
.header-progress{display:flex;align-items:center;gap:8px;font-size:13px;background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px}
.header-progress .progress-num{font-weight:600}
.hamburger{display:none;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px}
/* LAYOUT */
.app-layout{display:flex;padding-top:64px;min-height:100vh}
/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:#fff;border-right:1px solid var(--gray-200);padding:16px 0;position:fixed;top:64px;bottom:0;overflow-y:auto;z-index:50}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px}
.sidebar-section{padding:0 12px;margin-bottom:8px}
.sidebar-section .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-400);font-weight:600;padding:8px 12px 4px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;transition:var(--transition);font-size:14px;color:var(--gray-600);text-decoration:none;border:none;background:none;width:100%;text-align:left}
.sidebar-item:hover{background:var(--gray-100);color:var(--gray-800)}
.sidebar-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.sidebar-item .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--gray-300)}
.sidebar-item .status-dot.completed{background:var(--secondary)}
.sidebar-item .status-dot.in-progress{background:var(--amber)}
.sidebar-item .status-dot.locked{background:var(--gray-300)}
.sidebar-divider{height:1px;background:var(--gray-200);margin:8px 12px}
/* MAIN */
.main-content{flex:1;margin-left:240px;padding:32px 40px;max-width:960px}
.main-content.wide{max-width:1100px}
/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-400);margin-bottom:16px;flex-wrap:wrap}
.breadcrumb span{cursor:pointer;transition:var(--transition)}
.breadcrumb span:hover{color:var(--primary)}
.breadcrumb .sep{color:var(--gray-300)}
/* SECTION CARDS */
.section-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:28px 32px;margin-bottom:24px;border:1px solid var(--gray-200)}
.section-card h2{font-size:24px;font-weight:700;color:var(--gray-900);margin-bottom:6px}
.section-card h2 .badge{display:inline-block;font-size:12px;background:var(--primary-light);color:var(--primary);padding:2px 10px;border-radius:12px;font-weight:600;margin-left:8px;vertical-align:middle}
.section-card .subtitle{color:var(--gray-500);font-size:15px;margin-bottom:20px}
/* ACCORDION */
.accordion{margin-top:16px}
.accordion-item{border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.accordion-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--gray-50);cursor:pointer;transition:var(--transition);border:none;width:100%;text-align:left;font-size:15px;font-weight:600;color:var(--gray-700)}
.accordion-header:hover{background:var(--gray-100)}
.accordion-header .icon{transition:transform .25s;font-size:12px;color:var(--gray-400)}
.accordion-item.open .accordion-header .icon{transform:rotate(180deg)}
.accordion-body{padding:0 18px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease}
.accordion-item.open .accordion-body{max-height:600px;padding:14px 18px}
.accordion-body p{margin-bottom:8px;font-size:14px;color:var(--gray-600);line-height:1.7}
.accordion-body ul{margin:4px 0 8px 16px;font-size:14px;color:var(--gray-600)}
.accordion-body ul li{margin-bottom:4px}
/* EXAMPLE BOX */
.example-box{background:var(--primary-light);border-left:3px solid var(--primary);padding:12px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:8px 0}
.example-box p{margin-bottom:4px;font-size:14px}
.example-box .label{font-weight:600;color:var(--primary);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
/* MISTAKE BOX */
.mistake-box{background:var(--red-light);border-left:3px solid var(--red);padding:12px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:8px 0}
.mistake-box .label{font-weight:600;color:var(--red);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.mistake-box .wrong{text-decoration:line-through;color:var(--red)}
.mistake-box .correct{color:var(--secondary);font-weight:600}
/* COMPARE BOX */
.compare-box{background:var(--amber-light);border-left:3px solid var(--amber);padding:12px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:8px 0}
.compare-box .label{font-weight:600;color:var(--amber);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
/* SIGNAL WORDS */
.signal-tags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.signal-tags span{background:var(--gray-100);color:var(--gray-600);padding:3px 10px;border-radius:12px;font-size:13px;border:1px solid var(--gray-200)}
/* TABS */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--gray-200);padding-bottom:0}
.tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:500;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition)}
.tab-btn:hover{color:var(--gray-700)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
/* QUIZ */
.quiz-container{margin-top:8px}
.quiz-question{margin-bottom:20px;padding:16px;border:1px solid var(--gray-200);border-radius:var(--radius);background:var(--gray-50)}
.quiz-question .q-text{font-size:15px;font-weight:600;color:var(--gray-800);margin-bottom:10px}
.quiz-question .q-text .q-num{color:var(--primary);margin-right:6px}
.quiz-options{display:flex;flex-direction:column;gap:6px}
.quiz-option{display:flex;align-items:center;gap:8px;padding:10px 14px;border:2px solid var(--gray-200);border-radius:var(--radius);cursor:pointer;transition:var(--transition);background:#fff;font-size:14px}
.quiz-option:hover{border-color:var(--primary);background:var(--primary-light)}
.quiz-option.selected{border-color:var(--primary);background:var(--primary-light)}
.quiz-option.correct{border-color:var(--secondary);background:var(--secondary-light)}
.quiz-option.wrong{border-color:var(--red);background:var(--red-light)}
.quiz-option .letter{width:24px;height:24px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--gray-500);flex-shrink:0}
.quiz-option.selected .letter{background:var(--primary);color:#fff}
.quiz-option.correct .letter{background:var(--secondary);color:#fff}
.quiz-option.wrong .letter{background:var(--red);color:#fff}
.quiz-option.disabled{cursor:default;opacity:.7}
.quiz-option.disabled:hover{border-color:var(--gray-200);background:#fff}
.quiz-feedback{font-size:13px;margin-top:8px;padding:8px 12px;border-radius:var(--radius);display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:var(--secondary-light);color:#065f46}
.quiz-feedback.wrong{background:var(--red-light);color:#991b1b}
.quiz-controls{display:flex;gap:8px;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);border:none;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-primary:disabled{background:var(--gray-300);cursor:not-allowed}
.btn-secondary{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200)}
.btn-secondary:hover{background:var(--gray-200)}
.btn-success{background:var(--secondary);color:#fff}
.btn-success:hover{background:#059669}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{background:#6d28d9}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-sm{padding:6px 14px;font-size:13px}
/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--gray-50);border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--gray-200)}
.score-bar .score-label{font-size:14px;color:var(--gray-600);font-weight:500}
.score-bar .score-value{font-size:20px;font-weight:700;color:var(--primary)}
.score-bar .score-total{font-size:14px;color:var(--gray-400)}
.score-bar .bar-track{flex:1;height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
.score-bar .bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:4px;transition:width .5s ease;width:0%}
/* QUIZ RESULT MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:var(--radius-lg);padding:32px;max-width:440px;width:100%;box-shadow:var(--shadow-lg);text-align:center}
.modal h3{font-size:22px;margin-bottom:8px}
.modal .modal-score{font-size:48px;font-weight:800;color:var(--primary);margin:12px 0}
.modal .modal-msg{color:var(--gray-500);margin-bottom:20px;font-size:15px}
.modal .modal-icon{font-size:56px;margin-bottom:8px}
.modal .modal-actions{display:flex;gap:8px;justify-content:center}
/* PRACTICE */
.practice-card{border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:var(--gray-50)}
.practice-card .p-task{font-size:14px;color:var(--gray-700);margin-bottom:8px}
.practice-card .p-task strong{color:var(--gray-900)}
.practice-card .p-input{width:100%;padding:10px 12px;border:2px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:inherit;resize:vertical;min-height:48px;transition:var(--transition)}
.practice-card .p-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.practice-card .p-answer{display:none;margin-top:8px;padding:10px 14px;background:var(--secondary-light);border-radius:var(--radius);font-size:14px;color:#065f46;border-left:3px solid var(--secondary)}
.practice-card .p-answer.show{display:block}
.practice-card .p-controls{display:flex;gap:6px;margin-top:8px}
/* COMPARISON TABLE */
.comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:12px 0}
.comparison-col{background:var(--gray-50);padding:14px;border-radius:var(--radius);border:1px solid var(--gray-200)}
.comparison-col h4{font-size:13px;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.comparison-col p{font-size:15px;font-weight:600;color:var(--gray-800)}
/* SUMMARY TABLE */
.summary-table{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0}
.summary-table th{background:var(--gray-50);padding:10px 12px;text-align:left;font-weight:600;color:var(--gray-600);border-bottom:2px solid var(--gray-200);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.summary-table td{padding:10px 12px;border-bottom:1px solid var(--gray-200);color:var(--gray-700);vertical-align:top}
.summary-table tr:hover td{background:var(--gray-50)}
.summary-table .tense-name{font-weight:600;color:var(--primary)}
.summary-table .grammar-name{font-weight:600;color:var(--purple)}
/* STUDY TIPS */
.tip-card{display:flex;gap:12px;padding:14px;background:var(--gray-50);border-radius:var(--radius);border:1px solid var(--gray-200);margin-bottom:8px}
.tip-card .tip-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.tip-card .tip-text{font-size:14px;color:var(--gray-700)}
.tip-card .tip-text strong{color:var(--gray-900)}
/* MISTAKES LIST */
.mistake-list{padding:0;list-style:none}
.mistake-list li{padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:14px;color:var(--gray-700);display:flex;gap:8px}
.mistake-list li::before{content:"!";width:20px;height:20px;border-radius:50%;background:var(--red-light);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
/* DASHBOARD */
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
.dash-card{padding:14px;border-radius:var(--radius);border:1px solid var(--gray-200);text-align:center;cursor:pointer;transition:var(--transition);background:#fff}
.dash-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md)}
.dash-card .dash-icon{font-size:22px;margin-bottom:4px}
.dash-card .dash-name{font-size:12px;font-weight:600;color:var(--gray-600)}
.dash-card .dash-status{font-size:11px;color:var(--gray-400);margin-top:2px}
.dash-card .dash-status.complete{color:var(--secondary);font-weight:600}
.dash-card .dash-status.in-progress{color:var(--amber);font-weight:600}
/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);position:fixed;z-index:90;width:260px;transition:transform .3s ease}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:block}
  .main-content{margin-left:0;padding:20px 16px}
  .app-header{padding:0 16px}
  .section-card{padding:20px 16px}
  .comparison-grid{grid-template-columns:1fr}
  .header-progress .progress-label{display:none}
  .dashboard-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .tab-btn{padding:8px 12px;font-size:13px}
}
@media(max-width:480px){
  .section-card h2{font-size:20px}
  .quiz-option{padding:8px 12px;font-size:13px}
  .modal{padding:24px 16px}
}
/* MERMAID BOX */
.mermaid-box{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;margin:12px 0;overflow-x:auto;font-size:13px}
/* UTILITY */
.hidden{display:none!important}
.mt-8{margin-top:8px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">&#9776;</button>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      English Tenses
    </div>
  </div>
  <div class="header-right">
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">&#127769;</button>
    <button class="theme-btn" onclick="resetAllProgress()" title="Reset all progress" style="font-size:16px">&#8635;</button>
    <div class="header-progress">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span class="progress-num" id="progressNum">0</span><span class="progress-label">/ <span id="totalCount">28</span></span>
    </div>
  </div>
</header>

<!-- LAYOUT -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Dashboard</div>
      <button class="sidebar-item active" data-section="dashboard" onclick="navigateTo('dashboard')">
        <span class="status-dot" style="background:var(--primary)"></span> Overview
      </button>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Present Tenses</div>
      <button class="sidebar-item" data-section="tense" data-tense="simple-present" onclick="navigateTo('tense','simple-present')">
        <span class="status-dot" id="dot-simple-present"></span> Simple Present
      </button>
      <button class="sidebar-item" data-section="tense" data-tense="present-continuous" onclick="navigateTo('tense','present-continuous')">
        <span class="status-dot" id="dot-present-continuous"></span> Present Continuous
      </button>
      <button class="sidebar-item" data-section="tense" data-tense="present-perfect" onclick="navigateTo('tense','present-perfect')">
        <span class="status-dot" id="dot-present-perfect"></span> Present Perfect
      </button>
      <button class="sidebar-item" data-section="tense" data-tense="present-perfect-continuous" onclick="navigateTo('tense','present-perfect-continuous')">
        <span class="status-dot" id="dot-present-perfect-continuous"></span> Present Perfect Continuous
      </button>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Past Tenses</div>
      <button class="sidebar-item" data-section="tense" data-tense="simple-past" onclick="navigateTo('tense','simple-past')">
        <span class="status-dot" id="dot-simple-past"></span> Simple Past
      </button>
      <button class="sidebar-item" data-section="tense" data-tense="past-continuous" onclick="navigateTo('tense','past-continuous')">
        <span class="status-dot" id="dot-past-continuous"></span> Past Continuous
      </button>
      <button class="sidebar-item" data-section="tense" data-tense="past-perfect" onclick="navigateTo('tense','past-perfect')">
        <span class="status-dot" id="dot-past-perfect"></span> Past Perfect

const GRAMMAR = [
  {id:'zero-conditional',name:'Zero Conditional',category:'conditionals',definition:'The Zero Conditional describes general truths, habits, and situations that are always true when a certain condition is met.',structure:'If + subject + Simple Present, subject + Simple Present<br>Example: If you heat ice, it melts.',usage:['Scientific facts and general truths (always true)','Habits and routines that always happen','Instructions and commands (can use "when" instead of "if")'],signalWords:'if, when, whenever, every time',examples:['If you heat water to 100°C, it boils.','If I am tired, I drink coffee.','When it rains, the grass gets wet.'],commonMistake:{wrong:'If I will study, I will pass.',correct:'If I study, I pass. (Zero = general truth, not future)',note:'Students use "will" in both clauses. In Zero Conditional, use Simple Present in both.'},comparison:{with:'First Conditional',diff:'Zero = always true (If you heat ice, it melts.)<br>First = possible future (If it rains, I will stay home.)'}},
  {id:'first-conditional',name:'First Conditional',category:'conditionals',definition:'The First Conditional describes a possible future situation and its likely result.',structure:'If + subject + Simple Present, subject + will + base verb<br>Example: If it rains, I will stay home.',usage:['Real/possible situations in the future','Predictions about what will happen if conditions are met','Promises or warnings about the future'],signalWords:'if, unless, as long as, provided that, in case',examples:['If you study hard, you will pass the exam.','If she calls me, I will tell her the news.','Unless you hurry, you will miss the bus.'],commonMistake:{wrong:'If it will rain, I will stay home.',correct:'If it rains, I will stay home.',note:'Students put "will" in the if-clause. Use Simple Present in the if-clause.'},comparison:{with:'Zero Conditional',diff:'First = possible future (If you study, you will pass.)<br>Zero = always true (If you heat ice, it melts.)'}},
  {id:'second-conditional',name:'Second Conditional',category:'conditionals',definition:'The Second Conditional describes imaginary or unlikely situations in the present or future.',structure:'If + subject + Simple Past, subject + would + base verb<br>Example: If I had a million dollars, I would travel the world.',usage:['Imaginary situations that are unlikely or impossible now','Advice using "If I were you..."','Dreams and wishes about the present/future'],signalWords:'if, even if, suppose, supposing, what if',examples:['If I won the lottery, I would buy a house.','If I were you, I would talk to the manager.','What would you do if you lost your job?'],commonMistake:{wrong:'If I would be rich, I would buy a car.',correct:'If I were rich, I would buy a car.',note:'Students use "would" in the if-clause. Use Simple Past (or "were" for all subjects) in the if-clause.'},comparison:{with:'First Conditional',diff:'First = possible (If it rains, I will stay.)<br>Second = imaginary (If I were you, I would leave.)'}},
  {id:'third-conditional',name:'Third Conditional',category:'conditionals',definition:'The Third Conditional describes impossible past situations — things that did NOT happen.',structure:'If + subject + had + V3, subject + would + have + V3<br>Example: If I had studied, I would have passed.',usage:['Regrets about the past (things you wish you had done differently)','Criticizing past mistakes','Imagining how the past could have been different'],signalWords:'if, if only, had I known, otherwise',examples:['If I had woken up earlier, I would not have missed the flight.','She would have passed if she had studied more.','If they had invited me, I would have gone.'],commonMistake:{wrong:'If I would have studied, I would have passed.',correct:'If I had studied, I would have passed.',note:'Students use "would have" in the if-clause. Use "had + V3" in the if-clause.'},comparison:{with:'Second Conditional',diff:'Third = impossible past (If I had studied, I would have passed.)<br>Second = unlikely now (If I studied, I would pass.)'}},
  {id:'mixed-conditional',name:'Mixed Conditional',category:'conditionals',definition:'Mixed Conditionals combine an unreal past condition with a present result.',structure:'If + subject + had + V3 (past), subject + would + base verb (present)<br>Example: If I had studied medicine, I would be a doctor now.',usage:['A past situation that did not happen, with a result that affects the present','Explaining why something is the way it is now because of a past action/inaction'],signalWords:'if, now, today, right now, would be',examples:['If I had accepted that job, I would be living in London now.','If she had not missed the bus, she would be here with us.','They would not be in trouble now if they had listened.'],commonMistake:{wrong:'If I had studied, I would have been a doctor now.',correct:'If I had studied, I would be a doctor now.',note:'Mixed: past condition (had + V3) + present result (would + base verb).'},comparison:{with:'Third Conditional',diff:'Mixed = past > present (If I had studied, I would be rich now.)<br>Third = past > past (If I had studied, I would have passed.)'}},
  {id:'passive-voice',name:'Passive Voice',category:'essential',definition:'The Passive Voice shifts focus from who did the action to the action itself or who received it.',structure:'Subject + be (conjugated) + past participle (V3) + (by + agent)<br>Example: English is spoken worldwide.',usage:['When the doer is unknown, obvious, or unimportant','To focus on the action or the receiver of the action','Formal writing and scientific reports'],signalWords:'by, is/are/am + V3, was/were + V3, be + V3, been + V3',examples:['The letter was written by Ali.','My car has been stolen.','English is taught in most schools.','The bridge will be completed next year.'],commonMistake:{wrong:'The window was broke.',correct:'The window was broken.',note:'Students forget that the past participle (V3) is needed after "be" in passive.'},comparison:{with:'Active Voice',diff:'Active = subject does action (Ali wrote the letter.)<br>Passive = subject receives action (The letter was written by Ali.)'}},
  {id:'reported-speech',name:'Reported Speech',category:'essential',definition:'Reported Speech (Indirect Speech) reports what someone said without quoting their exact words.',structure:'Reporting verb + that + clause (with tense shift)<br>Present Past, Past Past Perfect, will would<br>Example: She said (that) she was tired.',usage:['Reporting statements, questions, and commands','Tense shifts: present past, past past perfect, will would','Time/place changes: now then, today that day, here there'],signalWords:'said, told, asked, explained, replied, stated, claimed, mentioned',examples:['She said she was tired. (from "I am tired")','He asked if I had eaten. (from "Have you eaten?")','She told me to go away. (from "Go away!")','He said he would come the next day. (from "I will come tomorrow")'],commonMistake:{wrong:'She said me that she is happy.',correct:'She told me that she was happy.',note:'Students confuse say and tell. Say + (that) | Tell + person + (that). Also forget tense shift.'},comparison:{with:'Direct Speech',diff:'Direct = exact words in quotes (She said, "I am happy.")<br>Reported = paraphrased, tense shifted (She said she was happy.)'}},
  {id:'modal-verbs',name:'Modal Verbs',category:'essential',definition:'Modal verbs express ability, permission, obligation, possibility, advice, and necessity.',structure:'Modal + base verb (no "to", no -s)<br>Can, could, may, might, must, should, ought to, have to, need to, will, would, shall',usage:['Ability: I can swim. / I could swim when I was five.','Permission: May I come in? / Can I use your phone?','Obligation: You must wear a seatbelt. / You have to finish this.','Advice: You should see a doctor. / You ought to apologize.','Possibility: It might rain. / She may be late.'],signalWords:'can, could, may, might, must, should, ought to, have to, had better, need to',examples:['You must finish your homework before you go out.','She can speak three languages fluently.','You should not eat so much sugar.','May I use your phone?','He might be at the office; I am not sure.'],commonMistake:{wrong:'He can to swim.',correct:'He can swim.',note:'Students add "to" after modal verbs. Modals are followed directly by the base verb (no to, no -s).'},comparison:{with:'Simple Present',diff:'Modal + base verb: same for all persons (He can / They can no -s)<br>Simple Present adds -s for he/she/it (He swims / They swim)'}},
  {id:'wishes-regrets',name:'Wishes & Regrets',category:'essential',definition:'We use "wish" and "if only" to talk about things we want to be different in the present, past, or future.',structure:'Wish + past tense = present wish (I wish I had more money.)<br>Wish + past perfect = past regret (I wish I had studied.)<br>Wish + would = future complaint (I wish you would stop.)',usage:['Present wish (want to change a present situation): I wish I were taller.','Past regret (wish something had been different): I wish I had not said that.','Future complaint (wish someone would change): I wish you would listen.','If only = stronger version of wish (If only I had known!)'],signalWords:'wish, if only, regret, should have, would rather, had better',examples:['I wish I were better at mathematics. (present and I am not)','If only I had studied harder for the exam. (past I did not)','I wish it would stop raining. (complaint)','I should have called her. (regret about the past)'],commonMistake:{wrong:'I wish I am taller.',correct:'I wish I were taller.',note:'After "wish," use past tense for present meaning. Always use "were" for all subjects (I wish I were..., NOT I wish I was...).'},comparison:{with:'Third Conditional',diff:'Wish = feeling (I wish I had studied.)<br>Third Conditional = action-outcome (If I had studied, I would have passed.)'}},
  {id:'relative-clauses',name:'Relative Clauses',category:'essential',definition:'Relative clauses give extra information about a noun using relative pronouns (who, whom, which, that, whose).',structure:'Defining (essential): The man who lives next door is a doctor.<br>Non-defining (extra info, with commas): My brother, who lives in Cairo, is an engineer.',usage:['Defining relative clauses: necessary to identify the person/thing (no commas)','Non-defining relative clauses: extra information not essential (use commas)','Who/that = people, Which/that = things, Whose = possession, Where = places, When = times'],signalWords:'who, whom, which, that, whose, where, when, why',examples:['The woman who lives next door is a teacher. (defining)','The car which I want to buy is expensive. (defining)','My father, who is 65, still works every day. (non-defining)','The student whose phone rang was embarrassed.','The house where I grew up has been demolished.'],commonMistake:{wrong:'The man which lives next door is a doctor.',correct:'The man who lives next door is a doctor.',note:'Students use "which" for people. Use "who" for people, "which" for things.'},comparison:{with:'Adjective',diff:'Adjective = before noun (the tall man)<br>Relative clause = after noun (the man who is tall)'}},
  {id:'gerund-infinitive',name:'Gerund vs Infinitive',category:'essential',definition:'Gerunds (verb+ing as a noun) and infinitives (to + base verb) follow different verbs with different meanings.',structure:'Gerund: verb + ing (used as a noun) Swimming is fun.<br>Infinitive: to + base verb I want to go home.',usage:['Gerund after certain verbs: enjoy, avoid, suggest, mind, finish, practice, recommend','Infinitive after certain verbs: want, need, decide, hope, promise, agree, refuse','Change in meaning: stop + gerund = quit; stop + infinitive = pause to do','Change in meaning: remember + gerund = recall; remember + infinitive = not forget','Prepositions + gerund: interested in, good at, tired of, afraid of'],signalWords:'enjoy, avoid, suggest, mind, want, need, decide, hope, promise, stop, remember, forget, try',examples:['I enjoy reading books in my free time. (gerund)','She decided to study abroad. (infinitive)','I stopped smoking last year. (= I quit)','I stopped to buy coffee on the way. (= I paused)','Would you mind opening the window?'],commonMistake:{wrong:'I enjoy to swim in the sea.',correct:'I enjoy swimming in the sea.',note:'After "enjoy," use gerund (-ing), not infinitive. Many verbs have specific patterns.'},comparison:{with:'Both possible different meaning',diff:'Stop + gerund = quit (I stopped smoking.)<br>Stop + infinitive = pause to do (I stopped to smoke.)'}},
  {id:'used-to',name:'Used to / Would',category:'essential',definition:'Used to and would describe past habits, states, and repeated actions that no longer happen.',structure:'Used to + base verb (past habits/states that stopped)<br>Would + base verb (past repeated actions, NOT states)<br>Be used to + noun/gerund (be accustomed to)<br>Get used to + noun/gerund (become accustomed to)',usage:['Used to = past habits AND past states that no longer exist (I used to smoke)','Would = past repeated actions only, NOT states (We would visit grandma)','Be used to = be accustomed to (I am used to waking up early.)','Get used to = become accustomed to (You will get used to the weather.)'],signalWords:'used to, would (past), be used to, get used to, no longer, not anymore',examples:['I used to play football every day when I was young.','She used to have long hair. (state would is NOT possible)','My family would go to the beach every summer.','I am not used to eating such spicy food.','You will soon get used to working from home.'],commonMistake:{wrong:'I used to studied hard.',correct:'I used to study hard.',note:'Students add past tense after "used to." Use base verb: used to + base verb.'},comparison:{with:'Simple Past',diff:'Used to = past habit that stopped (I used to play cricket.)<br>Simple Past = a single finished action (I played cricket last Friday.)'}},
  {id:'articles',name:'Articles (a/an/the)',category:'essential',definition:'Articles determine whether a noun is specific or general, known or unknown to the listener.',structure:'a/an = indefinite, general, first mention (singular countable nouns)<br>the = definite, specific, or already known<br>zero article = general plural or uncountable nouns',usage:['a/an = not specific, first time mentioned, one of many (I saw a cat.)','the = specific, known, already mentioned, unique (The cat was black.)','zero article = general statements (Cats are cute.), meals, proper nouns, institutions'],signalWords:'a, an, the, some, any, no article',examples:['I bought a car yesterday. (first mention)','The car is red. (now the listener knows which)','An apple a day keeps the doctor away.','The sun rises in the east. (unique)','I love music. (general no article)','She is at school. (institution no article)'],commonMistake:{wrong:'I have car.',correct:'I have a car.',note:'Arabic speakers often omit articles. Singular countable nouns almost always need an article.'},comparison:{with:'Arabic (al-)',diff:'Arabic uses "al-" (the) more broadly than English.<br>English uses "the" only when specific/known.<br>English uses "a/an" for general singular nouns.'}},
  {id:'causative',name:'Causative Have/Get',category:'essential',definition:'The causative expresses that you arrange for someone else to do something for you.',structure:'Have + object + V3 (I had my hair cut.)<br>Get + object + V3 (I got my car fixed.)<br>Have + person + base verb (I had him fix the car.)<br>Get + person + to + base verb (I got him to fix the car.)',usage:['Services: arranging for professionals (I had my hair cut.)','Getting someone to do something (I got the technician to check my internet.)','Experience: something bad happening to you (I had my phone stolen.)'],signalWords:'have something done, get something done, make someone do, let someone do',examples:['I need to have my computer repaired.','She had her hair styled for the wedding.','He got his car washed yesterday.','I had my wallet stolen on the bus.','I got my son to clean his room.'],commonMistake:{wrong:'I had cut my hair.',correct:'I had my hair cut.',note:'Students confuse causative with past perfect. Causative: have + object + V3.'},comparison:{with:'Active (I did it myself)',diff:'Active = I did it (I washed my car.)<br>Causative = someone else did it (I had my car washed.)'}},
  {id:'prepositions',name:'Prepositions (Time & Place)',category:'essential',definition:'Prepositions show relationships between words, especially time and place.',structure:'AT + specific time/point (at 5 oclock, at night, at the corner)<br>IN + months/years/enclosed spaces (in July, in Egypt)<br>ON + days/dates/surfaces (on Monday, on July 5th, on the table)',usage:['Time: at = clock times/night (at 3 PM); in = months/years/seasons (in summer); on = days/dates (on Friday)','Place: at = specific points (at the door); in = cities/countries (in Cairo); on = surfaces/streets (on the table)'],signalWords:'at, in, on, by, for, since, ago, until, during, from...to, between, among, beside, next to, opposite, near',examples:['The meeting is at 3 oclock.','I was born in July.','Her birthday is on Monday.','She lives in Cairo.','The book is on the shelf.'],commonMistake:{wrong:'I will meet you on Monday at 8 oclock in the morning.',correct:'I will meet you at 8 oclock on Monday morning.',note:'Word order: at + time on + day. Stack correctly.'},comparison:{with:'No preposition',diff:'Some phrases drop the preposition: "this morning" (not in), "last week" (not in), "next year" (not in), "every day" (not on).'}}

// ============================================================
// STATE — with localStorage persistence
// ============================================================
const STORAGE_KEY = 'english_tenses_progress';

function emptyState() {
  const s = {
    currentSection: 'dashboard',
    currentTenseId: null,
    currentGrammarId: null,
    quizStates: {},
    grammarQuizStates: {},
    mixedQuizState: {current:0, score:0, answered:false, completed:false, selected:null},
    practiceRevealed: Array(PRACTICE_EXERCISES.length).fill(false),
    completedTenses: [],
    completedGrammar: []
  };
  TENSES.forEach(t=>{s.quizStates[t.id]={current:0,score:0,answered:false,completed:false,selected:null};});
  GRAMMAR.forEach(g=>{s.grammarQuizStates[g.id]={current:0,score:0,answered:false,completed:false,selected:null};});
  return s;
}

function persistProgress() {
  try {
    const data = {
      quizStates: state.quizStates,
      grammarQuizStates: state.grammarQuizStates,
      mixedQuizState: state.mixedQuizState,
      practiceRevealed: state.practiceRevealed,
      completedTenses: [...state.completedTenses],
      completedGrammar: [...state.completedGrammar]
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(data.quizStates) Object.assign(state.quizStates, data.quizStates);
    if(data.grammarQuizStates) Object.assign(state.grammarQuizStates, data.grammarQuizStates);
    if(data.mixedQuizState) Object.assign(state.mixedQuizState, data.mixedQuizState);
    if(data.practiceRevealed) state.practiceRevealed = data.practiceRevealed;
    if(data.completedTenses) state.completedTenses = new Set(data.completedTenses);
    if(data.completedGrammar) state.completedGrammar = new Set(data.completedGrammar);
    // Sync practiceRevealed length
    while(state.practiceRevealed.length < PRACTICE_EXERCISES.length) state.practiceRevealed.push(false);
  } catch(e) {}
}

function resetAllProgress() {
  if(!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = emptyState();
  loadProgress();
  render();
  updateDots();
}

let state = emptyState();
loadProgress();

// ============================================================
// HELPERS
// ============================================================
function calculateTotalQuizScore() {
  let total = 0;
  TENSES.forEach(t=>{const q=state.quizStates[t.id];if(q.completed) total+=q.score;});
  GRAMMAR.forEach(g=>{const q=state.grammarQuizStates[g.id];if(q.completed) total+=q.score;});
  if(state.mixedQuizState.completed) total+=state.mixedQuizState.score;
  return total;
}

// ============================================================
// RENDER ENGINE
// ============================================================
function navigateTo(section, topicId) {
  state.currentSection = section;
  if(section==='tense') state.currentTenseId = topicId;
  else if(section==='grammar') state.currentGrammarId = topicId;
  render();
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  let selector;
  if(section==='dashboard') selector='[data-section="dashboard"]';
  else if(section==='tense') selector=`[data-section="tense"][data-tense="${topicId}"]`;
  else if(section==='grammar') selector=`[data-section="grammar"][data-grammar="${topicId}"]`;
  else if(section==='practice') selector='[data-section="practice"]';
  else if(section==='mixed-quiz') selector='[data-section="mixed-quiz"]';
  else if(section==='summary') selector='[data-section="summary"]';
  const el = document.querySelector(selector);
  if(el) el.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo(0,0);
}

function render() {
  const main = document.getElementById('mainContent');
  const section = state.currentSection;
  updateProgress();
  switch(section) {
    case 'dashboard': renderDashboard(main); break;
    case 'tense': renderTense(main, state.currentTenseId); break;
    case 'grammar': renderGrammar(main, state.currentGrammarId); break;
    case 'practice': renderPractice(main); break;
    case 'mixed-quiz': renderMixedQuiz(main); break;
    case 'summary': renderSummary(main); break;
    default: renderDashboard(main);
  }
}

function updateProgress() {
  const total = TENSES.length + GRAMMAR.length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressNum').textContent = state.completedTenses.size + state.completedGrammar.size;
}

function updateDots() {
  TENSES.forEach(t=>{
    const dot = document.getElementById(`dot-${t.id}`);
    if(dot){
      if(state.completedTenses.has(t.id)) dot.className='status-dot completed';
      else if(state.quizStates[t.id] && state.quizStates[t.id].current>0) dot.className='status-dot in-progress';
      else dot.className='status-dot';
    }
  });
  GRAMMAR.forEach(g=>{
    const dot = document.getElementById(`dot-${g.id}`);
    if(dot){
      if(state.completedGrammar.has(g.id)) dot.className='status-dot completed';
      else if(state.grammarQuizStates[g.id] && state.grammarQuizStates[g.id].current>0) dot.className='status-dot in-progress';
      else dot.className='status-dot';
    }
  });
}

        <div class="accordion-body"><div class="mistake-box"><div class="label">&#9888; Common Error</div><p>${topic.commonMistake.note}</p><p><span class="wrong">${topic.commonMistake.wrong}</span> &rarr; <span class="correct">${topic.commonMistake.correct}</span></p></div></div>
      </div>
      <div class="accordion-item">
        <button class="accordion-header" onclick="toggleAccordion(this)">Compare: ${topic.name} vs ${topic.comparison.with} <span class="icon">&#9660;</span></button>
        <div class="accordion-body"><div class="compare-box"><div class="label">&#128161; Key Difference</div><p>${topic.comparison.diff}</p></div></div>
      </div>
    </div>
    <div style="text-align:right;margin-top:16px">
      <button class="btn btn-primary" onclick="grammarTab='quiz';renderGrammar(document.getElementById('mainContent'),'${topic.id}')">Take Quiz &rarr;</button>
    </div>`;
}

function renderTenseQuiz(topic, questions, type) {
  const isTense = type === 'tense';
  const qs = isTense ? state.quizStates[topic.id] : state.grammarQuizStates[topic.id];
  if(!questions || questions.length===0) return '<p>No questions available.</p>';
  const q = questions[qs.current];
  const isLast = qs.current === questions.length-1;
  const total = questions.length;
  const labels = ['a','b','c','d'];
  const selectFn = isTense ? `selectTenseOption('${topic.id}',` : `selectGrammarOption('${topic.id}',`;
  const submitFn = isTense ? `submitTenseAnswer('${topic.id}')` : `submitGrammarAnswer('${topic.id}')`;
  const nextFn = isTense ? `nextTenseQuestion('${topic.id}')` : `nextGrammarQuestion('${topic.id}')`;
  const finishFn = isTense ? `finishTenseQuiz('${topic.id}')` : `finishGrammarQuiz('${topic.id}')`;
  const resetFn = isTense ? `resetTenseQuiz('${topic.id}')` : `resetGrammarQuiz('${topic.id}')`;
  let html = `
    <div class="score-bar">
      <span class="score-label">Score</span>
      <span class="score-value">${qs.score}</span><span class="score-total">/ ${total}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(qs.score/total)*100}%"></div></div>
    </div>
    <div class="quiz-container">
      <div class="quiz-question">
        <div class="q-text"><span class="q-num">Question ${qs.current+1} / ${total}:</span> ${q.q}</div>
        <div class="quiz-options" id="quizOptions">
  `;
  q.o.forEach((opt,i)=>{
    let cls='quiz-option';
    if(qs.answered){
      cls+=' disabled';
      if(i===q.a) cls+=' correct';
      else if(i===qs.selected) cls+=' wrong';
    } else if(i===qs.selected){
      cls+=' selected';
    }
    html+=`<div class="${cls}" onclick="${selectFn}${i})" data-idx="${i}">
      <span class="letter">${labels[i]}</span> ${opt}
    </div>`;
  });
  html+=`</div>`;
  if(qs.answered){
    const isCorrect = qs.selected === q.a;
    html+=`<div class="quiz-feedback show ${isCorrect?'correct':'wrong'}">
      ${isCorrect?'&#10003; Correct!':'&#10007; Sorry, that is not correct.'}
      ${!isCorrect?` The correct answer is: <strong>${labels[q.a]}) ${q.o[q.a]}</strong>`:''}
    </div>`;
  }
  html+=`<div class="quiz-controls">`;
  if(!qs.answered){
    html+=`<button class="btn btn-primary" onclick="${submitFn}" ${qs.selected===null?'disabled':''} id="submitBtn">Check Answer</button>`;
  } else {
    if(isLast){
      html+=`<button class="btn btn-success" onclick="${finishFn}">See Results</button>`;
    } else {
      html+=`<button class="btn btn-primary" onclick="${nextFn}">Next Question &rarr;</button>`;
    }
  }
  if(qs.answered){
    html+=`<button class="btn btn-secondary" onclick="${resetFn}">Reset Quiz</button>`;
  }
  html+=`</div></div></div>`;
  return html;
}

// ============================================================
// QUIZ LOGIC — Per Tense
// ============================================================
function selectTenseOption(tenseId, idx) {
  const qs = state.quizStates[tenseId];
  if(qs.answered) return;
  qs.selected = idx;
  renderTense(document.getElementById('mainContent'), tenseId);
}

function submitTenseAnswer(tenseId) {
  const qs = state.quizStates[tenseId];
  if(qs.selected===null || qs.answered) return;
  qs.answered = true;
  if(qs.selected === QUIZZES[tenseId][qs.current].a){
    qs.score++;
  }
  renderTense(document.getElementById('mainContent'), tenseId);
}

function nextTenseQuestion(tenseId) {
  const qs = state.quizStates[tenseId];
  if(qs.current < QUIZZES[tenseId].length-1){
    qs.current++;
    qs.answered = false;
    qs.selected = null;
  }
  renderTense(document.getElementById('mainContent'), tenseId);
}

function finishTenseQuiz(tenseId) {
  const qs = state.quizStates[tenseId];
  const total = QUIZZES[tenseId].length;
  qs.completed = true;
  if(qs.score === total){
    state.completedTenses.add(tenseId);
  } else if (qs.score >= Math.ceil(total/2)) {
    state.completedTenses.add(tenseId);
  }
  updateDots();
  updateProgress();
  persistProgress();
  showModal(
    qs.score === total ? '&#127942;' : qs.score >= Math.ceil(total/2) ? '&#128170;' : '&#128218;',
    qs.score === total ? 'Perfect Score!' : qs.score >= Math.ceil(total/2) ? 'Good Work!' : 'Keep Practicing!',
    `${qs.score} / ${total}`,
    qs.score === total ? 'You answered all questions correctly!' : qs.score >= Math.ceil(total/2) ? 'You passed the quiz. Try to get a perfect score!' : 'Review the lesson and try again.',
    tenseId, 'tense'
  );
}

function resetTenseQuiz(tenseId) {
  const qs = state.quizStates[tenseId];
  qs.current = 0;
  qs.score = 0;
  qs.answered = false;
  qs.selected = null;
  qs.completed = false;
  state.completedTenses.delete(tenseId);
  persistProgress();
  renderTense(document.getElementById('mainContent'), tenseId);
}

function retryQuiz() {
  // handled in modal
}

function retryFromModal() {
  closeModal();
  if(modalTenseId && modalType === 'grammar') {
    resetGrammarQuiz(modalTenseId);
    grammarTab = 'quiz';
    renderGrammar(document.getElementById('mainContent'), modalTenseId);
  } else if(modalTenseId && modalType === 'tense') {
    resetTenseQuiz(modalTenseId);
    tenseTab = 'quiz';
    renderTense(document.getElementById('mainContent'), modalTenseId);
  } else {
    resetMixedQuiz();
  }
}

// ============================================================
// QUIZ LOGIC — Grammar
// ============================================================
function selectGrammarOption(topicId, idx) {
  const qs = state.grammarQuizStates[topicId];
  if(qs.answered) return;
  qs.selected = idx;
  renderGrammar(document.getElementById('mainContent'), topicId);
}
function submitGrammarAnswer(topicId) {
  const qs = state.grammarQuizStates[topicId];
  if(qs.selected===null || qs.answered) return;
  qs.answered = true;
  if(qs.selected === GRAMMAR_QUIZZES[topicId][qs.current].a) qs.score++;
  renderGrammar(document.getElementById('mainContent'), topicId);
}
function nextGrammarQuestion(topicId) {
  const qs = state.grammarQuizStates[topicId];
  if(qs.current < GRAMMAR_QUIZZES[topicId].length-1){
    qs.current++; qs.answered = false; qs.selected = null;
  }
  renderGrammar(document.getElementById('mainContent'), topicId);
}
function finishGrammarQuiz(topicId) {
  const qs = state.grammarQuizStates[topicId];
  const total = GRAMMAR_QUIZZES[topicId].length;
  qs.completed = true;
  if(qs.score >= Math.ceil(total/2)) state.completedGrammar.add(topicId);
  updateDots(); updateProgress();
  persistProgress();
  showModal(
    qs.score === total ? '&#127942;' : qs.score >= Math.ceil(total/2) ? '&#128170;' : '&#128218;',
    qs.score === total ? 'Perfect!' : qs.score >= Math.ceil(total/2) ? 'Good Work!' : 'Keep Practicing!',
    `${qs.score} / ${total}`,
    qs.score === total ? 'All correct!' : qs.score >= Math.ceil(total/2) ? 'You passed. Try for perfect!' : 'Review and try again.',
    topicId, 'grammar'
  );
}
function resetGrammarQuiz(topicId) {
  const qs = state.grammarQuizStates[topicId];
  qs.current=0; qs.score=0; qs.answered=false; qs.selected=null; qs.completed=false;
  state.completedGrammar.delete(topicId);
  persistProgress();
  renderGrammar(document.getElementById('mainContent'), topicId);
}

// MODAL
// ============================================================
let modalTenseId = null;
let modalType = 'tense';
function showModal(icon, title, score, msg, topicId, type) {
  modalTenseId = topicId || null;
  modalType = type || 'tense';
  document.getElementById('modalIcon').innerHTML = icon;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalScore').textContent = score;
  document.getElementById('modalMsg').textContent = msg;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  modalTenseId = null;
}

// ============================================================
function renderMixedQuiz(container) {
  const mq = state.mixedQuizState;
  const q = MIXED_QUIZ[mq.current];
  const total = MIXED_QUIZ.length;
  const labels = ['a','b','c','d'];
  let html = `
    <div class="section-card fade-in">
      <h2>&#128203; Mixed Tenses Quiz</h2>
      <p class="subtitle">Test your knowledge of all tenses! ${mq.completed ? 'You have already completed this quiz.' : ''}</p>
      <div class="score-bar">
        <span class="score-label">Score</span>
        <span class="score-value">${mq.score}</span><span class="score-total">/ ${total}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${(mq.score/total)*100}%"></div></div>
      </div>
      <div class="quiz-container">
        <div class="quiz-question">
          <div class="q-text"><span class="q-num">Question ${mq.current+1} / ${total}:</span> ${q.q}</div>
          <div style="font-size:12px;color:var(--gray-400);margin-bottom:8px">(${q.tense})</div>
          <div class="quiz-options" id="mixedQuizOptions">
  `;
  q.o.forEach((opt,i)=>{
    let cls='quiz-option';
    if(mq.answered){
      cls+=' disabled';
      if(i===q.a) cls+=' correct';
      else if(i===mq.selected) cls+=' wrong';
    } else if(i===mq.selected){
      cls+=' selected';
    }
    html+=`<div class="${cls}" onclick="selectMixedOption(${i})" data-idx="${i}">
      <span class="letter">${labels[i]}</span> ${opt}
    </div>`;
  });
  html+=`</div>`;
  if(mq.answered){
    const isCorrect = mq.selected === q.a;
    html+=`<div class="quiz-feedback show ${isCorrect?'correct':'wrong'}">
      ${isCorrect?'&#10003; Correct!':'&#10007; The correct answer is: <strong>'+labels[q.a]+') '+q.o[q.a]+'</strong>'}
    </div>`;
  }
  html+=`<div class="quiz-controls">`;
  if(!mq.answered){
    html+=`<button class="btn btn-primary" onclick="submitMixedAnswer()" ${mq.selected===null?'disabled':''} id="mixedSubmitBtn">Check Answer</button>`;
  } else {
    if(mq.current < total-1){
      html+=`<button class="btn btn-primary" onclick="nextMixedQuestion()">Next Question &rarr;</button>`;
    } else {
      html+=`<button class="btn btn-success" onclick="finishMixedQuiz()">See Results</button>`;
    }
  }
  if(mq.answered || mq.completed){
    html+=`<button class="btn btn-secondary" onclick="resetMixedQuiz()">Reset Quiz</button>`;
  }
  html+=`</div></div></div>`;
  container.innerHTML = html;
}

function selectMixedOption(idx) {
  if(state.mixedQuizState.answered) return;
  state.mixedQuizState.selected = idx;
  renderMixedQuiz(document.getElementById('mainContent'));
}

function submitMixedAnswer() {
  const mq = state.mixedQuizState;
  if(mq.selected===null || mq.answered) return;
  mq.answered = true;
  if(mq.selected === MIXED_QUIZ[mq.current].a) mq.score++;
  renderMixedQuiz(document.getElementById('mainContent'));
}

function nextMixedQuestion() {
  const mq = state.mixedQuizState;
  if(mq.current < MIXED_QUIZ.length-1){
    mq.current++;
    mq.answered = false;
    mq.selected = null;
  }
  renderMixedQuiz(document.getElementById('mainContent'));
}

function finishMixedQuiz() {
  const mq = state.mixedQuizState;
  const total = MIXED_QUIZ.length;
  mq.completed = true;
  let icon, title, msg;
  if(mq.score === total){icon='&#127942;';title='Perfect Score!';msg='You mastered everything! Excellent work!';}
  else if(mq.score >= 20){icon='&#128170;';title='Great Job!';msg='You have a very strong understanding.';}
  else if(mq.score >= 14){icon='&#128221;';title='Good Effort!';msg='Keep practicing to improve your score.';}
  else {icon='&#128218;';title='Keep Studying';msg='Review the lessons and try again.';}
  persistProgress();
  showModal(icon, title, `${mq.score} / ${total}`, msg, null, 'mixed');
  renderMixedQuiz(document.getElementById('mainContent'));
}

function resetMixedQuiz() {
  state.mixedQuizState = {current:0,score:0,answered:false,completed:false,selected:null};
  persistProgress();
  renderMixedQuiz(document.getElementById('mainContent'));
}
